# Publish adelaidasofia-instagram-mcp to PyPI on a published GitHub Release.
#
# PREREQUISITE — configure the PyPI trusted publisher BEFORE the first release,
# or this job fails red (auto-managed-gate-self-dos rule). On pypi.org:
#   Account -> Publishing -> Add a pending publisher
#     PyPI project name: adelaidasofia-instagram-mcp
#     Owner:             adelaidasofia
#     Repository:        instagram-mcp
#     Workflow filename: publish-mcp.yml
#     Environment:       pypi
# No API token is stored anywhere — publishing uses short-lived OIDC.
#
# Hardened split: the build job holds NO id-token; a separate minimal publish
# job mints the OIDC token and never executes build/dependency code.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC: mint the short-lived token PyPI trusts. No secrets.
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
